name: 🐞 Bug Report
description: Report something that isn't working as expected
title: "🐞 [Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Fill out the sections below so it's reproducible.
  - type: checkboxes
    id: component
    attributes:
      label: Component
      description: Which part of GhostWire does this affect?
      options:
        - label: Coordination server
        - label: Clientside Agent (WireGuard / NAT / CLI)
        - label: Desktop client (Frontend)
        - label: Docs / infra
        - label: Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Distro
      placeholder: e.g., Ubuntu 24.04, Windows 11, macOS Sequoia
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment & Versioning
      description: Provide the GhostWire agent version / commit hash.
      placeholder: e.g. GhostWire v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs
      render: shell
    validations:
      required: false
